services:
  seo-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seo-agent-ec2
    ports:
      # Uses a non-conflicting host port by default.
      - "${SEO_AGENT_HOST_PORT:-8011}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/seo-agent.db
    volumes:
      - seo-data:/app/data
    restart: unless-stopped

volumes:
  seo-data:
