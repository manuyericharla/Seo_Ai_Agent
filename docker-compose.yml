services:
  seo-agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SEO_AGENT_HOST_PORT:-8011}:3000"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/seo-agent.db
    volumes:
      - seo-data:/app/data
    restart: unless-stopped

volumes:
  seo-data:
